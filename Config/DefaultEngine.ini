[/Script/Engine.RendererSettings]
; Grey-box perf (2026-07-01): RTX 50-series (Blackwell) + UE5.8 renders the full game
; path at ~1-2 FPS with Lumen + MegaLights + Virtual Shadow Maps (the engine frame
; counter hit only 809 over 6.5 min standalone = ~2 fps). Strip to a lightweight
; renderer for the movement sandbox; restore these for real levels (Phase 4+). See LESSONS.
r.ReflectionMethod=0
r.GenerateMeshDistanceFields=True
r.DynamicGlobalIlluminationMethod=0
r.Lumen.TraceMeshSDFs=0
r.Shadow.Virtual.Enable=0
r.MegaLights.EnableForProject=False
r.DefaultFeature.AutoExposure.ExtendDefaultLuminanceRange=True
r.DefaultFeature.AutoExposure.ExtendDefaultLuminanceRange=true
r.AllowStaticLighting=False

r.SkinCache.CompileShaders=True

; Ray tracing disabled for the grey-box sandbox: the template's Lumen hardware
; ray tracing deadlocked at render init ("Recreating Persistent SBTs") on first PIE.
; We don't need RT for a movement test. Lumen falls back to software mode.
; Revisit for the real neighborhoods (Phase 4+) if HWRT is wanted — see Docs/LESSONS.md.
r.RayTracing=False

r.RayTracing.RayTracingProxies.ProjectEnabled=True

; --- Grey-box lightweight-render overrides (forced at runtime, highest priority) ---
; Kills the Blackwell/UE5.8 ~2fps stall by disabling heavy features + fixing PSO stutter.
[SystemSettings]
r.DynamicGlobalIlluminationMethod=0
r.ReflectionMethod=0
r.Shadow.Virtual.Enable=0
r.MegaLights.EnableForProject=0
r.VolumetricCloud=0
r.VolumetricFog=0
r.D3D12.PSO.DiskCache=1
r.D3D12.PSO.DriverOptimizedDiskCache=1
sg.GlobalIlluminationQuality=0
sg.ReflectionQuality=0
sg.ShadowQuality=1
sg.EffectsQuality=1
sg.PostProcessQuality=1

r.Substrate=True

r.Substrate.ProjectGBufferFormat=0

r.DefaultFeature.LocalExposure.HighlightContrastScale=0.8

r.DefaultFeature.LocalExposure.ShadowContrastScale=0.8

